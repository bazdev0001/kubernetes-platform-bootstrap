---
# ArgoCD Application: kube-prometheus-stack
#
# Deploys Prometheus Operator, Prometheus, Alertmanager, Grafana, and a full
# suite of Kubernetes recording rules and alert rules.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "55.5.0"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        fullnameOverride: prometheus

        # ---------------------------------------------------------------
        # Prometheus
        # ---------------------------------------------------------------
        prometheus:
          prometheusSpec:
            # Scrape all PrometheusRule and ServiceMonitor resources
            # across all namespaces, not just those matching the release label.
            ruleNamespaceSelector: {}
            ruleSelector: {}
            serviceMonitorNamespaceSelector: {}
            serviceMonitorSelector: {}
            podMonitorNamespaceSelector: {}
            podMonitorSelector: {}

            retention: 15d
            retentionSize: 45GB

            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                cpu: 2000m
                memory: 6Gi

            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 50Gi

        # ---------------------------------------------------------------
        # Alertmanager
        # ---------------------------------------------------------------
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

          config:
            global:
              resolve_timeout: 5m

            route:
              group_by: [alertname, cluster, namespace]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: "null"
              routes:
                - match:
                    alertname: Watchdog
                  receiver: "null"
                - match:
                    severity: critical
                  receiver: pagerduty
                - match:
                    severity: warning
                  receiver: slack

            receivers:
              - name: "null"

              - name: pagerduty
                pagerduty_configs:
                  - routing_key: "REPLACE_WITH_PAGERDUTY_KEY"
                    description: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

              - name: slack
                slack_configs:
                  - api_url: "REPLACE_WITH_SLACK_WEBHOOK_URL"
                    channel: "#platform-alerts"
                    title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
                    text: "{{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}\n{{ end }}"

        # ---------------------------------------------------------------
        # Grafana
        # ---------------------------------------------------------------
        grafana:
          adminPassword: "REPLACE_WITH_SEALED_SECRET"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          persistence:
            enabled: true
            storageClassName: gp3
            size: 10Gi

          # Pre-load the standard Kubernetes dashboards.
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: Kubernetes
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default

          dashboards:
            default:
              kubernetes-cluster:
                gnetId: 7249
                revision: 1
                datasource: Prometheus
              node-exporter:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus

          grafana.ini:
            server:
              root_url: "https://grafana.REPLACE_WITH_DOMAIN"
            auth.generic_oauth:
              enabled: false

        # ---------------------------------------------------------------
        # node-exporter
        # ---------------------------------------------------------------
        nodeExporter:
          enabled: true

        # ---------------------------------------------------------------
        # kube-state-metrics
        # ---------------------------------------------------------------
        kubeStateMetrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# Additional alert rules layered on top of the default kube-prometheus rules.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: platform.node
      interval: 1m
      rules:
        - alert: NodeHighCPU
          expr: |
            (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node CPU usage above 85% for 10 minutes ({{ $labels.instance }})"
            description: "CPU usage is {{ $value | humanize }}%."

        - alert: NodeDiskPressure
          expr: |
            (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"}) * 100 < 15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low disk space on {{ $labels.instance }} ({{ $labels.mountpoint }})"
            description: "Only {{ $value | humanize }}% disk space remaining."

    - name: platform.workloads
      interval: 1m
      rules:
        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas
              != kube_deployment_status_available_replicas
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has replica count mismatch"
            description: "Expected {{ $value }} replicas but available count differs for 15m."

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 5 > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} has restarted more than 5 times in 5 minutes."
